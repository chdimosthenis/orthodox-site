name: Daily Saints Seed

on:
  schedule:
    # 03:00 UTC daily — that's 05:00 EET / 06:00 EEST (Greek time)
    - cron: '0 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

# Don't let two runs collide if a manual trigger overlaps with the cron
concurrency:
  group: daily-saints
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Python dependencies
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed upcoming commemorations from OrthodoxWiki
        working-directory: scripts
        run: python daily_seed.py --days 2

      - name: Fetch Wikimedia Commons icons for new entries
        working-directory: scripts
        # Don't fail the run if icon lookup hits a transient API issue
        run: python fetch_icon.py --update-all || true

      - name: Detect new saint files
        id: changes
        run: |
          new=$(git status --porcelain src/content/saints/ | wc -l)
          echo "new_files=$new" >> "$GITHUB_OUTPUT"
          echo "Detected $new new/modified saint files"

      - name: Install Node dependencies
        if: steps.changes.outputs.new_files != '0'
        run: npm ci

      - name: Verify Astro build before committing
        if: steps.changes.outputs.new_files != '0'
        run: npm run build

      - name: Commit and push
        if: steps.changes.outputs.new_files != '0'
        run: |
          git config user.name "orthodox-bot"
          git config user.email "noreply@orthodox-site.pages.dev"
          git add src/content/saints/
          new_count=$(git diff --staged --name-only -- 'src/content/saints/*.md' | wc -l | tr -d ' ')
          today=$(date +%Y-%m-%d)
          git commit -m "chore(bot): seed +${new_count} commemorations (${today})"
          git push

      - name: Summary
        run: |
          echo "## Daily seed run" >> $GITHUB_STEP_SUMMARY
          echo "- New/modified saint files: ${{ steps.changes.outputs.new_files }}" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.changes.outputs.new_files }}" == "0" ]]; then
            echo "- No new commemorations — site is current." >> $GITHUB_STEP_SUMMARY
          fi
