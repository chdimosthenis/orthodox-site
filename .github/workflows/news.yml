name: News Aggregator

on:
  schedule:
    # Every 6 hours — 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '5 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: news-aggregator
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch news from RSS sources
        working-directory: scripts
        run: python fetch_news.py --limit 30

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet src/data/news.json 2>/dev/null; then
            echo "changed=0" >> "$GITHUB_OUTPUT"
            echo "No new news items."
          else
            echo "changed=1" >> "$GITHUB_OUTPUT"
            echo "News refreshed."
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == '1'
        run: |
          git config user.name "orthodox-news-bot"
          git config user.email "noreply@orthodox-site.pages.dev"
          git add src/data/news.json
          ts=$(date -u +%Y-%m-%dT%H:%MZ)
          git commit -m "chore(news): refresh aggregated feed (${ts})"
          git push

      - name: Summary
        run: |
          echo "## News aggregator run" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.changes.outputs.changed }}" == "1" ]]; then
            echo "- ✅ news.json updated and pushed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- No changes since last run" >> $GITHUB_STEP_SUMMARY
          fi
